<style>
/* ============================================================
   DuctCalc Pro V5 — "Frost" Design Language
   Premium dark theme: indigo/lavender accent, soft shadows,
   generous radius, Inter + DM Mono
   ============================================================ */

:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface-2: #232329;
  --surface-3: #2d2d35;

  --text: #f4f4f5;
  --text-2: #a1a1aa;
  --text-3: #63637a;

  --accent: #818cf8;
  --accent-soft: rgba(129,140,248,0.1);
  --accent-medium: rgba(129,140,248,0.2);
  --accent-glow: 0 0 20px rgba(129,140,248,0.15);

  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;

  --supply: #f87171;
  --return: #60a5fa;
  --airflow: #34d399;

  --radius: 20px;
  --radius-sm: 12px;
  --radius-xs: 8px;

  /* Legacy aliases for JS inline styles */
  --bg-0: #0f0f11;
  --bg-1: #1a1a1f;
  --bg-2: #232329;
  --bg-3: #2d2d35;
  --bg-4: #3a3a44;
  --bg-primary: #0f0f11;
  --bg-card: #1a1a1f;
  --bg-elevated: #2d2d35;
  --bg-input: #0f0f11;
  --surface-0: #0f0f11;
  --surface-1: #1a1a1f;
  --surface-4: #3a3a44;
  --border-subtle: rgba(255,255,255,0.04);
  --border-default: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.06);
  --border-focus: #818cf8;
  --border-light: rgba(255,255,255,0.10);
  --glass: rgba(15,15,17,0.92);
  --glass-border: rgba(255,255,255,0.04);
  --text-primary: #f4f4f5;
  --text-0: #f4f4f5;
  --text-1: #d4d4d8;
  --text-secondary: #a1a1aa;
  --text-muted: #63637a;
  --text-dim: #63637a;
  --accent-strong: #6366f1;
  --accent-subtle: rgba(129,140,248,0.1);
  --accent-dim: rgba(129,140,248,0.1);
  --accent-hover: #6366f1;
  --accent-light: #a5b4fc;
  --accent-glow-legacy: rgba(129,140,248,0.15);
  --green-soft: rgba(52,211,153,0.1);
  --green-subtle: rgba(52,211,153,0.1);
  --amber-soft: rgba(251,191,36,0.1);
  --amber-subtle: rgba(251,191,36,0.1);
  --red-soft: rgba(248,113,113,0.1);
  --red-subtle: rgba(248,113,113,0.1);
  --pass: #34d399;
  --warn: #fbbf24;
  --fail: #f87171;
  --info: #818cf8;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --supply-color: #f87171;
  --return-color: #60a5fa;
  --airflow-color: #34d399;
  --red-glow: #818cf8;
  --red-dark: #6366f1;
  --yellow: #fbbf24;
  --orange: #fbbf24;
  --blue: #60a5fa;
  --card-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.15);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.15);
  --shadow-elevated: 0 4px 16px rgba(0,0,0,0.4), 0 12px 40px rgba(0,0,0,0.2);
  --shadow-button: 0 2px 12px rgba(129,140,248,0.25);
  --glow-red: 0 0 20px rgba(129,140,248,0.15);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
  --text-xs: 10px;
  --text-sm: 12px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 18px;
  --text-2xl: 24px;
  --text-3xl: 32px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'cv01', 'cv02', 'cv03', 'cv04';
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 80px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  margin: 0;
}

/* Mono for numbers */
.mono, [class*="result-val"], input[type="number"],
.slider-value-input, .fr-input, .fr-result, .wiz-result-val,
.compression-readout-value, .dial-readout-value {
  font-family: 'DM Mono', monospace;
  font-feature-settings: 'tnum';
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

/* ===== HEADER ===== */
.header {
  padding: 14px 20px;
  background: rgba(15,15,17,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 56px;
  cursor: pointer;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.header-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.header-subtitle {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-weight: 600;
}

/* ===== OLD NAV (hidden for JS compat) ===== */
.nav { display: none !important; }
.nav-tabs { display: none; }
.nav-tab { display: none; }

/* ===== APP CONTAINER ===== */
.app-container {
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== PAGE SYSTEM ===== */
.page { display: none; padding-top: 8px; padding-bottom: 24px; }
.page.active {
  display: block;
  animation: pageEnter 0.2s ease-out;
}

@keyframes pageEnter {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== PANELS / CARDS ===== */
.panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}

.panel-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; }

.section-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title svg { flex-shrink: 0; }

/* ===== INPUT FIELDS ===== */
.input-field, select.input-field {
  background: var(--bg);
  border: 1.5px solid rgba(255,255,255,0.05);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  height: 48px;
  font-size: 15px;
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: 'DM Mono', monospace;
  width: 100%;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.input-field:focus, select.input-field:focus {
  border-color: var(--accent);
  box-shadow: var(--accent-glow);
}

.input-label, .config-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-2);
  margin-bottom: 6px;
  display: block;
}

.input-group { margin-bottom: 8px; }

/* ===== SEGMENTED CONTROLS ===== */
.seg-control {
  display: flex;
  background: var(--bg);
  border-radius: 16px;
  padding: 4px;
  gap: 3px;
}
.seg-btn {
  flex: 1;
  height: 42px;
  border-radius: 13px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  background: transparent;
  transition: all 0.15s ease;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Inter', -apple-system, sans-serif;
  touch-action: manipulation;
}
.seg-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow-button);
}
.seg-btn:active { transform: scale(0.96); }

/* ===== OPTION BUTTONS (Wizard) ===== */
.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.opt-btn {
  background: var(--surface);
  border: 2px solid transparent;
  border-radius: var(--radius);
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  overflow: hidden;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: var(--shadow-card);
  -webkit-tap-highlight-color: transparent;
}
.opt-btn:active { transform: scale(0.97); }
.opt-btn.active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.opt-btn .opt-icon { margin-bottom: 4px; display: flex; justify-content: center; align-items: center; color: var(--text-2); }
.opt-btn.active .opt-icon { color: var(--accent); }
.opt-btn .opt-icon svg { width: 24px; height: 24px; }
.opt-btn .opt-label { font-size: 14px; font-weight: 600; color: var(--text); }
.opt-btn.active .opt-label { color: var(--accent); }
.opt-btn .opt-note { font-size: 11px; color: var(--text-3); }
.opt-btn.active .opt-note { color: var(--accent); opacity: 0.8; }

/* ===== BUTTONS ===== */
.btn-primary, .wiz-btn-primary {
  height: 52px;
  background: var(--accent);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  border: none;
  border-radius: 16px;
  box-shadow: var(--shadow-button);
  transition: transform 0.12s, opacity 0.12s;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active, .wiz-btn-primary:active {
  transform: scale(0.97);
  opacity: 0.9;
}

.wiz-btn-secondary {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid rgba(129,140,248,0.2);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  width: 100%;
  cursor: pointer;
  margin-top: 8px;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Inter', -apple-system, sans-serif;
}
.wiz-btn-secondary:active { background: var(--accent-soft); }

.wiz-btn-add, .sys-add-step-btn {
  background: transparent;
  border: 1.5px dashed rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-2);
  width: 100%;
  cursor: pointer;
  margin-top: 6px;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.wiz-btn-add:active, .sys-add-step-btn:active { border-color: var(--accent); color: var(--accent); }
.wiz-btn-add svg { width: 15px; height: 15px; }

.add-fitting-btn, .filter-apply-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-xs);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: 'Inter', -apple-system, sans-serif;
}
.add-fitting-btn:active, .filter-apply-btn:active { transform: scale(0.96); }
.filter-apply-btn { width: 100%; margin-top: 10px; height: 48px; border-radius: var(--radius-sm); }

/* ===== RESULTS GRID ===== */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.result-card {
  background: var(--surface-2);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.15s;
}
.result-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--text-3);
  border-radius: 16px 16px 0 0;
}
.result-card.success::after { background: var(--green); }
.result-card.warning::after { background: var(--amber); }
.result-card.danger::after { background: var(--red); }

.result-value {
  font-family: 'DM Mono', monospace;
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.result-unit {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-3);
  margin-top: 4px;
}
.result-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  margin-top: 2px;
  font-weight: 500;
}

.hero-number {
  font-family: 'DM Mono', monospace;
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.02em;
}

/* ===== CONFIG ROWS ===== */
.config-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.config-group { flex: 1; }

/* ===== TOGGLE SWITCH ===== */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
  cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface-3);
  border-radius: 12px;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.2s;
}
input:checked + .toggle-slider { background: var(--accent); }
input:checked + .toggle-slider::before { transform: translateX(20px); }

/* ===== SLIDER PANELS ===== */
.slider-panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
}
.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.slider-label { font-size: 13px; font-weight: 600; color: var(--text); }
.slider-value-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}
.slider-value-input {
  background: var(--bg);
  border: 1.5px solid rgba(255,255,255,0.05);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  width: 64px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.2s;
}
.slider-value-input:focus { border-color: var(--accent); }
.slider-value-unit {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
}
.slider-range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-3);
  margin-top: 6px;
}

/* Range inputs */
input[type="range"], .cfm-slider, .compression-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(to right, var(--green) 0%, var(--amber) 50%, var(--red) 100%);
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  cursor: pointer;
  border: none;
  transition: transform 0.1s;
}
input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.15); }
input[type="range"]::-moz-range-thumb {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  cursor: pointer;
  border: none;
}

/* ===== MODE TOGGLE ===== */
.mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 16px;
  padding: 4px;
  gap: 3px;
  margin-bottom: 14px;
}
.mode-btn {
  flex: 1;
  height: 42px;
  border-radius: 13px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  background: transparent;
  transition: all 0.15s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Inter', -apple-system, sans-serif;
}
.mode-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow-button);
}
.mode-btn:active { transform: scale(0.97); }

/* ===== COMPRESSION ===== */
.compression-panel {
  background: var(--surface-2);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
}
.compression-panel-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.compression-panel-title svg { width: 16px; height: 16px; color: var(--amber); }
.compression-presets {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.compression-preset-btn {
  padding: 6px 10px;
  border-radius: 8px;
  background: var(--surface-3);
  border: none;
  color: var(--text-2);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}
.compression-preset-btn.active {
  background: var(--accent);
  color: #fff;
}
.compression-impact {
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 8px;
  margin-top: 6px;
}
.compression-impact.low { background: var(--green-soft); color: var(--green); }
.compression-impact.medium { background: var(--amber-soft); color: var(--amber); }
.compression-impact.high { background: var(--red-soft); color: var(--red); }

/* ===== STATUS BAR ===== */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-top: 10px;
  font-size: 12px;
  font-weight: 500;
}
.status-bar.ok { background: var(--green-soft); color: var(--green); }
.status-bar.error { background: var(--red-soft); color: var(--red); }
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ===== REVERSE MODE ===== */
.size-panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-card);
}
.rev-capacity-bar { margin-top: 8px; }
.rev-bar-track {
  display: flex;
  height: 12px;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 6px;
}
.rev-bar-zone { transition: width 0.3s ease; }
.rev-bar-low { background: var(--amber); }
.rev-bar-ok { background: var(--green); }
.rev-bar-high { background: var(--red); }
.rev-bar-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
}
.rev-bar-captions {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
}

/* ===== HOME PAGE ===== */
#page-home {
  padding: 0 20px 40px;
  max-width: 480px;
  margin: 0 auto;
}
#page-home.active { display: block; }

.home-hero {
  text-align: center;
  padding: 36px 0 24px;
}
.home-logo-mark {
  width: 80px;
  height: 80px;

}
.fr-result-ok { background: var(--green-soft); }
.fr-result-warn { background: var(--amber-soft); }
.fr-result-bad { background: var(--red-soft); }
.fr-result-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 6px;
}
.fr-result-msg { font-size: 12px; line-height: 1.5; color: var(--text-2); }
.fr-chart-wrap {
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
}
.fr-factor-display {
  padding: 8px 12px;
  background: var(--surface-2);
  border-radius: var(--radius-xs);
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
}

/* ===== PSYCHROMETRIC ===== */
.psych-mode-sel {
  display: flex;
  background: var(--bg);
  border-radius: 16px;
  padding: 4px;
  gap: 3px;
  margin-bottom: 14px;
}
.psych-mode-btn {
  flex: 1;
  height: 38px;
  border-radius: 13px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  background: transparent;
  transition: all 0.15s;
  cursor: pointer;
  font-family: 'Inter', -apple-system, sans-serif;
}
.psych-mode-btn.active { background: var(--accent); color: #fff; }
.psych-inputs { display: flex; flex-direction: column; gap: 8px; }
.psych-input-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.psych-input-row label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  flex: 1;
}
.psych-input-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
}
.psych-input-wrap .input-field {
  width: 90px;
  height: 40px;
  text-align: center;
  font-size: 14px;
}
.psych-input-unit {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  width: 30px;
}
.psych-results { display: flex; flex-direction: column; }
.psych-result-row {
  display: grid;
  grid-template-columns: 1fr auto 40px;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 12px;
  align-items: center;
}
.psych-result-row:last-child { border-bottom: none; }
.psych-result-row span:first-child { color: var(--text-2); }
.psych-result-row span:nth-child(2) {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--text);
  text-align: right;
}
.psych-result-row span:nth-child(3) {
  font-size: 10px;
  color: var(--text-3);
}

/* ===== SYSTEM PAGE EXTRAS ===== */
.sys-ap-card { background: var(--surface-2); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.sys-mat-card { background: var(--surface-2); border-radius: 16px; padding: 14px; margin-bottom: 10px; }

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 20px 16px 30px;
  font-size: 11px;
}
footer a {
  color: var(--text-3);
  text-decoration: none;
  transition: color 0.15s;
}
footer a:hover { color: var(--accent); }

/* ===== MISC UTILITY ===== */
.green { color: var(--green) !important; }
.red { color: var(--red) !important; }
.yellow { color: var(--amber) !important; }
.done { opacity: 0.6; }
.collapsed .section-body { display: none; }
